name: MAPlanning — Weekly Scraper

on:
  schedule:
    - cron: "0 6 * * 2"   # Tuesday 06:00 UTC (07:00 UK)
    - cron: "0 6 * * 4"   # Thursday 06:00 UTC (07:00 UK)
  workflow_dispatch:
    inputs:
      weeks:
        description: "Weeks to scan (default 2; use 8 for first backfill)"
        default: "2"
      include_geo_blocked:
        description: "Include geo-blocked councils? (true = Colab UK-IP only)"
        default: "false"

jobs:
  scrape:
    name: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 310   # 5h10m — GitHub Actions hard limit is 6h
 
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt -q
 
      - name: Run MAPlanning engine
        run: python core/engine_ma.py --weeks ${{ github.event.inputs.weeks || '2' }} --mode decisions
        env:
          # ── Google Sheets ─────────────────────────────────────────────
          GCP_SERVICE_ACCOUNT_JSON:  ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          # ── Email digest ──────────────────────────────────────────────
          GMAIL_APP_PASSWORD:        ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_FROM:                ${{ secrets.GMAIL_FROM }}
          GMAIL_TO_MAPLANNING:       ${{ secrets.GMAIL_TO_MAPLANNING }}
          # ── AI & Maps (add these secrets — see README) ─────────────────
          OPENAI_API_KEY:            ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_MAPS_API_KEY:       ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # ── Runtime control ────────────────────────────────────────────
          MAX_RUNTIME_HOURS:         "4.8"
          INCLUDE_GEO_BLOCKED:       ${{ github.event.inputs.include_geo_blocked || 'false' }}
